plex:
  url: "http://192.168.1.69:32400"
  token: "YOUR_PLEX_TOKEN"
  library: "Music"

path_mapping:
  itunes_prefix: "file://localhost/D:/Music/iTunes/iTunes Media/Music/"
  plex_prefix: "/media/music/"

itunes:
  library_xml: "D:\\Music\\iTunes\\iTunes Library.xml"

sync:
  # Album-level: iTunes playlist -> Plex Collection
  collections:
    "iTunes Playlist Name": "Plex Collection Name"

  # Track-level: iTunes playlist -> Plex Playlist (preserves order)
  playlists:
    "iTunes Playlist Name": "Plex Playlist Name"

  # Record label: iTunes playlist -> Plex album studio/label field
  labels:
    "iTunes Label Playlist": "Record Label Name"
